<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="description" content="Notas sobre restaurantes, comida y experiencias.">
  <meta property="og:site_name" content="Restaurant and Food Blog">
  <meta property="og:title" content="Restaurant and Food Blog">
  <meta property="og:description" content="Notas sobre restaurantes, comida y experiencias.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="og-image.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Restaurant and Food Blog - JM">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Restaurant and Food Blog">
  <meta name="twitter:description" content="Notas sobre restaurantes, comida y experiencias.">
  <meta name="twitter:image" content="og-image.svg">
  <title>Restaurant and Food Blog</title>
  <style>
    body {
      margin: 0;
      background: #f7f7f7;
      color: #111;
      font-family: "Times New Roman", Times, serif;
      font-size: 18px;
      line-height: 1.5;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 18px;
    }

    h1 {
      margin: 0 0 28px;
      font-size: 34px;
      font-weight: normal;
    }

    ul {
      margin: 0;
      padding-left: 24px;
    }

    li {
      margin: 0 0 10px;
    }

    a {
      color: #000;
      text-decoration: underline;
    }

    .error {
      color: #555;
      font-style: italic;
    }
  </style>
</head>
<body>
  <main>
    <h1>Restaurant and Food Blog</h1>

    <ul id="restaurants">
      <li>Cargando...</li>
    </ul>
  </main>

  <script>
    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function safeMarkdownFile(file) {
      if (typeof file !== 'string') return null;
      if (!file.endsWith('.md')) return null;
      if (file.includes('..') || file.startsWith('/')) return null;
      return file;
    }

    async function loadIndex() {
      const list = document.getElementById('restaurants');

      try {
        const response = await fetch('articulos/index.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('No se pudo cargar el índice.');

        const data = await response.json();
        const articles = Array.isArray(data.articles) ? data.articles : [];
        const items = articles
          .map((article) => {
            const file = safeMarkdownFile(article.file);
            if (!file) return '';

            const name = article.restaurant || file.replace(/\.md$/i, '');
            const href = `nota.html?file=${encodeURIComponent(file)}`;
            return `<li><a href="${href}">${escapeHtml(name)}</a></li>`;
          })
          .filter(Boolean);

        list.innerHTML = items.length ? items.join('') : '<li class="error">No hay restaurantes todavía.</li>';
      } catch (error) {
        list.innerHTML = '<li class="error">No se pudo cargar el índice.</li>';
      }
    }

    loadIndex();
  </script>
</body>
</html>
